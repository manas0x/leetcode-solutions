name: Update README Tree

on:
  push:
    branches:
      - main
    paths:
      - 'LeetCode/**'
      - 'GeeksForGeeks/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Generate LeetCode Stats SVG
        run: php .github/scripts/stats.php > leetcode-stats.svg

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate README
        run: python .github/scripts/generate_readme.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md leetcode-stats.svg
          git commit -m "docs: auto-generate README tree structure [skip ci]" || echo "No changes to commit"
          git push
